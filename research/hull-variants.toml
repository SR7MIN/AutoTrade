# Frozen research matrix for the Hull Suite direction/stop comparison.
# All instances use HMA(55), daily closes, 1x notional, and full current equity.

[instances.hull-btc-long-stop]
implementation = "hull-suite-full-equity-v1"
enabled = true
symbol = "BTCUSDT"
interval = "1d"

[instances.hull-btc-long-stop.parameters]
direction = "long"
protective_stop_enabled = true
length = 55
atr_period = 14
stop_atr_multiple = "2"
structure_lookback = 10
structure_atr_buffer = "0.25"
min_stop_atr = "1.5"
max_stop_atr = "3.5"
risk_usdt = "1"
leverage = 1
margin_utilization = "1"

